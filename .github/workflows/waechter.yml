name: SelfStorm Wächter

on:
  schedule:
    - cron: "17 * * * *"   # stündlich (UTC), leicht versetzt
  workflow_dispatch:        # zum manuellen Testen im Actions-Tab

permissions:
  contents: write           # damit state.json zurückgeschrieben werden darf

concurrency:
  group: waechter
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: nodemailer installieren
        working-directory: warner
        run: npm install nodemailer --no-save --no-audit --no-fund

      - name: Wetterlage prüfen & ggf. benachrichtigen
        working-directory: warner
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node check.mjs

      - name: Alarm-Status sichern
        run: |
          if ! git diff --quiet -- warner/state.json; then
            git config user.name "selfstorm-bot"
            git config user.email "bot@selfcoder.de"
            git add warner/state.json
            git commit -m "chore(waechter): Alarm-Status aktualisiert [skip ci]"
            git push
          else
            echo "kein State-Wechsel"
          fi
